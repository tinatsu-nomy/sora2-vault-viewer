name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Syntax check
        run: npm run check

      - name: Smoke test
        run: npm test
